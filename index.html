<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>To-Do List</h1>

    <button id="themeToggle">Modo Escuro</button>

    <div class="form">
        <input type="text" id="taskInput" placeholder="Digite a tarefa...">

        <select id="priority">
            <option value="alta">Alta</option>
            <option value="media">Média</option>
            <option value="baixa">Baixa</option>
        </select>

        <input type="datetime-local" id="dateTime">

        <button onclick="addTask()">Adicionar</button>
    </div>

    <div class="filters">
        <select id="filter" onchange="renderTasks()">
            <option value="todas">Todas</option>
            <option value="alta">Alta</option>
            <option value="media">Média</option>
            <option value="baixa">Baixa</option>
            <option value="concluidas">Concluídas</option>
        </select>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const text = document.getElementById("taskInput").value;
    const priority = document.getElementById("priority").value;
    const dateTime = document.getElementById("dateTime").value;

    if (!text) return;

    tasks.push({
        text,
        priority,
        dateTime,
        done: false
    });

    sortTasks();
    saveTasks();
    renderTasks();

    document.getElementById("taskInput").value = "";
}

function sortTasks() {
    const order = { alta: 1, media: 2, baixa: 3 };
    tasks.sort((a, b) => order[a.priority] - order[b.priority]);
}

function toggleDone(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

function editTask(index) {
    const newText = prompt("Editar tarefa:", tasks[index].text);
    if (newText !== null) {
        tasks[index].text = newText;
        saveTasks();
        renderTasks();
    }
}

function renderTasks() {
    const list = document.getElementById("taskList");
    const filter = document.getElementById("filter").value;

    list.innerHTML = "";

    tasks.forEach((task, index) => {

        if (filter !== "todas") {
            if (filter === "concluidas" && !task.done) return;
            if (filter !== "concluidas" && task.priority !== filter) return;
        }

        const li = document.createElement("li");
        li.className = `${task.priority} ${task.done ? "done" : ""}`;

        li.innerHTML = `
            <span>
                ${task.text} <br>
                <small>${task.dateTime || ""}</small>
            </span>

            <div>
                <button onclick="toggleDone(${index})">✔</button>
                <button onclick="editTask(${index})">✏</button>
                <button onclick="deleteTask(${index})">🗑</button>
            </div>
        `;

        list.appendChild(li);
    });
}

const themeToggle = document.getElementById("themeToggle");

themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        themeToggle.textContent = "Modo Claro";
    } else {
        themeToggle.textContent = "Modo Escuro";
    }
});

renderTasks();
</script>

</body>
</html>
