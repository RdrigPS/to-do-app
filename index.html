<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Digite a tarefa">
    
    <select id="priority">
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
    </select>

    <button onclick="addTask()">Adicionar</button>

    <div class="filters">
        <select id="filterPriority" onchange="renderTasks()">
            <option value="todas">Todas</option>
            <option value="alta">Alta</option>
            <option value="media">Média</option>
            <option value="baixa">Baixa</option>
        </select>

        <select id="filterStatus" onchange="renderTasks()">
            <option value="todas">Todas</option>
            <option value="pendentes">Pendentes</option>
            <option value="concluidas">Concluídas</option>
        </select>
    </div>

    <div id="taskList"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const text = document.getElementById("taskInput").value;
    const priority = document.getElementById("priority").value;

    if (text.trim() === "") return;

    tasks.push({
        text,
        priority,
        completed: false
    });

    document.getElementById("taskInput").value = "";
    saveTasks();
    renderTasks();
}

function toggleTask(index) {
    tasks[index].completed = !tasks[index].completed;
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

function sortTasks(list) {
    const order = { alta: 1, media: 2, baixa: 3 };
    return list.sort((a, b) => order[a.priority] - order[b.priority]);
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    const filterPriority = document.getElementById("filterPriority").value;
    const filterStatus = document.getElementById("filterStatus").value;

    let filtered = tasks.filter(task => {
        return (filterPriority === "todas" || task.priority === filterPriority) &&
               (filterStatus === "todas" ||
               (filterStatus === "concluidas" && task.completed) ||
               (filterStatus === "pendentes" && !task.completed));
    });

    filtered = sortTasks(filtered);

    filtered.forEach((task, index) => {
        const div = document.createElement("div");
        div.className = `task ${task.priority} ${task.completed ? "completed" : ""}`;

        div.innerHTML = `
            <span>${task.text}</span>
            <div class="actions">
                <button onclick="toggleTask(${index})">✔</button>
                <button onclick="deleteTask(${index})">✖</button>
            </div>
        `;

        list.appendChild(div);
    });
}

renderTasks();
</script>

</body>
</html>
